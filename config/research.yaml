# Research workflow configuration

# Maximum number of research iterations (plan → search → ... → critic)
max_rounds: 2

# Quality thresholds for each round (must be met to skip re-planning)
quality_thresholds:
  round_1: 40
  round_2: 50
  round_3: 60

# Default quality threshold (used if round not in quality_thresholds)
quality_threshold: 50

# Search sources — what to search in parallel
search_sources:
  - brave          # Brave Search (real web, 2000/mo free)
  - tavily         # Tavily (AI-optimized, 1000/mo free)
  - duckduckgo     # DuckDuckGo Instant Answers (no key)
  - arxiv          # arXiv academic papers (no key)
  - wikipedia      # Wikipedia encyclopedia (no key)

# Max search results per source
max_search_results_per_source: 5

# Max queries per search round
max_search_queries: 2

# Max parallel searches (each query runs in its own agent instance)
# Set to 1 for sequential, higher values for parallel (respect API rate limits)
max_parallel_searches: 3

# Max agent turns (ReAct loop iterations) per task
max_agent_turns:
  planner: 2
  searcher: 2
  analyst: 3
  synthesizer: 3
  writer: 5
  critic: 3

# Wall-clock timeout per agent (seconds) — prevents infinite hangs
agent_timeouts:
  planner: 300
  searcher: 600
  analyst: 600
  synthesizer: 600
  writer: 900
  critic: 300

# Output settings
output_dir: ./reports

# Debug — if set, each node's output dict is saved to this directory
# for post-run quality assessment. Leave empty/null to disable.
debug_dir: ./debug
output_formats:
  - markdown

# Language: "zh" for Chinese, "en" for English
language: zh

# MCP (Model Context Protocol) tool servers
mcp:
  enabled: true  # Set to true to use MCP servers instead of in-process tools
  transport: stdio
  servers:
    search:
      command: uv
      args: ["run", "python", "-m", "src.tools.mcp_server"]
    # To add external MCP tools, add entries here, e.g.:
    # github:
    #   command: npx
    #   args: ["-y", "@anthropic/mcp-server-github"]

# Human-in-the-loop — pause after each Critic review for human approval
# When enabled, LangGraph interrupt() pauses execution. User reviews the
# full draft report (saved to review_dir) and decides: approve / revise / abort.
# Requires checkpointing (auto-enabled when HITL is on).
human_in_the_loop:
  enabled: true
  review_dir: ./reviews

# Enable checkpointer for crash recovery (auto-enabled when HITL is on)
use_checkpointer: false
checkpointer_path: ./data/checkpoints.sqlite
